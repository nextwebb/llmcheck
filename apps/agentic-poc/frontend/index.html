<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Workflow POC</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Agentic Workflow Chat POC</h1>
      <div class="controls">
        <input id="sessionId" value="demo-session" />
        <button id="newSession">New Session</button>
        <button id="clearSession">Clear History</button>
      </div>
      <section id="timeline" class="timeline"></section>
      <form id="chatForm" class="chat-form">
        <textarea id="message" placeholder="Ask about refunds, calculate 2+2, or mark task done"></textarea>
        <button type="submit">Send</button>
      </form>
      <details>
        <summary>Latest Trace</summary>
        <pre id="tracePanel"></pre>
      </details>
      <p id="status"></p>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
