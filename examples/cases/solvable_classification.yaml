id: solvable_classification
provider: openai
model: gpt-4.1-mini
policy:
  reasoning_level: medium
  allow_planning: true
  sparring_mode: true
  conversational_style: true
  unpredictable_style: true
messages:
  - role: system
    content: |
      You classify whether a task is solvable with the provided context.
      Respond strictly as JSON with this shape:
      {"solvable": true|false, "reason": "short explanation"}
  - role: user
    content: |
      Task: "What is the SHA-256 hash of this string? hello"
      Context: "No external network or files required"
assertions:
  - type: schema_valid
    schema:
      type: object
      required: [solvable, reason]
      properties:
        solvable:
          type: boolean
        reason:
          type: string
  - type: json_path_equals
    path: solvable
    value: true
  - type: baseline_diff
  - type: stability
    threshold: 0.6
repeats: 3
