id: solvable_classification_anthropic
provider: anthropic
model: claude-3-5-sonnet-latest
policy:
  reasoning_level: medium
  allow_planning: true
  sparring_mode: true
  conversational_style: true
  unpredictable_style: true
messages:
  - role: system
    content: |
      You classify whether a task is solvable with the provided context.
      Respond strictly as JSON with this shape:
      {"solvable": true|false, "reason": "short explanation"}
  - role: user
    content: |
      Task: "Given two integers 384 and 128, return their greatest common divisor."
      Context: "No external network or files required"
assertions:
  - type: schema_valid
    schema:
      type: object
      required: [solvable, reason]
      properties:
        solvable:
          type: boolean
        reason:
          type: string
  - type: json_path_equals
    path: solvable
    value: true
  - type: baseline_diff
  - type: stability
    threshold: 0.6
repeats: 3
